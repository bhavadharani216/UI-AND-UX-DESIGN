<!DOCTYPE html>
<html>
<head>
    <title>Colorful Resume</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        .header {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
            padding: 25px;
            border-radius: 10px;
        }

        .header h1 {
            margin: 0;
        }

        .section {
            margin-top: 25px;
        }

        .section h2 {
            color: #ff7e5f;
            border-bottom: 3px solid #feb47b;
            padding-bottom: 5px;
        }

        ul {
            list-style-type: square;
        }

        li {
            margin: 5px 0;
        }

        p {
            font-size: 16px;
        }

        /* Skills Highlight */
        .skills li {
            display: inline-block;
            background: #74ebd5;
            color: black;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                width: 95%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Your Name</h1>
        <p>Email: yourmail@gmail.com | Phone: 1234567890</p>
    </div>

    <div class="section">
        <h2>Objective</h2>
        <p>To obtain a challenging position where I can use my skills.</p>
    </div>

    <div class="section">
        <h2>Education</h2>
        <ul>
            <li>B.Tech - XYZ College</li>
            <li>12th - ABC School</li>
        </ul>
    </div>

    <div class="section">
        <h2>Skills</h2>
        <ul class="skills">
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>Python</li>
        </ul>
    </div>

    <div class="section">
        <h2>Projects</h2>
        <p><b>Loan Prediction System</b></p>
    </div>

</div>

</body>
</html>
