<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .required::after {
            content: " *";
            color: red;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            margin-top: 15px;
        }

        .nav {
            text-align: center;
            margin-bottom: 10px;
        }

        .nav a {
            margin: 0 10px;
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Navigation Links -->
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">Login</a>
    </div>

    <h2>Student Registration</h2>

    <form>
        <!-- Linked Labels -->
        <label for="name" class="required">Name</label>
        <input type="text" id="name" required>

        <label for="email" class="required">Email</label>
        <input type="email" id="email" required>

        <label for="phone">Phone</label>
        <input type="text" id="phone">

        <label for="course" class="required">Course</label>
        <select id="course" required>
            <option value="">Select</option>
            <option>B.Tech</option>
            <option>B.Sc</option>
        </select>

        <label for="password" class="required">Password</label>
        <input type="password" id="password" required>

        <button type="submit">Register</button>
    </form>

</div>

</body>
</html>
